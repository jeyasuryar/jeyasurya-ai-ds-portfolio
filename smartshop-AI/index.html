<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartShop AI</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

header{
    background:#232f3e;
    color:white;
    text-align:center;
    padding:20px;
}

header h1{
    margin-bottom:10px;
}

.products{
    display:flex;
    justify-content:center;
    gap:25px;
    flex-wrap:wrap;
    padding:40px;
}

.card{
    background:white;
    width:280px;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card-content{
    padding:15px;
    text-align:center;
}

.price{
    color:green;
    font-size:20px;
    margin:10px 0;
}

button{
    background:#ff9900;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#e68a00;
}

.cart{
    text-align:center;
    padding:20px;
    font-size:20px;
    font-weight:bold;
}

/* Chatbot */

.chatbot{
    position:fixed;
    bottom:20px;
    right:20px;
    width:320px;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 0 20px rgba(0,0,0,0.3);
}

.chat-header{
    background:#232f3e;
    color:white;
    padding:15px;
    text-align:center;
}

#chatbox{
    height:250px;
    overflow-y:auto;
    padding:10px;
}

.message{
    margin:8px 0;
}

.user{
    color:blue;
}

.bot{
    color:green;
}

.chat-input{
    display:flex;
}

.chat-input input{
    flex:1;
    padding:10px;
    border:none;
    border-top:1px solid #ddd;
}

.chat-input button{
    border-radius:0;
}
</style>
</head>
<body>

<header>
    <h1>SmartShop AI</h1>
    <p>Your AI-Powered Shopping Assistant</p>
</header>

<div class="cart">
    Cart Items: <span id="cartCount">0</span>
</div>

<section class="products">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=500" alt="Headphones">
        <div class="card-content">
            <h3>Wireless Headphones</h3>
            <p class="price">₹1,999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=500" alt="Watch">
        <div class="card-content">
            <h3>Smart Watch</h3>
            <p class="price">₹2,999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=500" alt="Phone">
        <div class="card-content">
            <h3>Smart Phone</h3>
            <p class="price">₹14,999</p>
            <button onclick="addToCart()">Add to Cart</button>
        </div>
    </div>

</section>

<!-- Chatbot -->

<div class="chatbot">

    <div class="chat-header">
        AI Shopping Assistant
    </div>

    <div id="chatbox">
        <div class="message bot">
            Bot: Hello! Ask me about products.
        </div>
    </div>

    <div class="chat-input">
        <input
            type="text"
            id="userInput"
            placeholder="Ask something..."
        >
        <button onclick="sendMessage()">Send</button>
    </div>

</div>

<script>

let cart = 0;

function addToCart(){
    cart++;
    document.getElementById("cartCount").innerText = cart;
}

function sendMessage(){

    let input =
    document.getElementById("userInput");

    let chatbox =
    document.getElementById("chatbox");

    let text =
    input.value.toLowerCase();

    if(text === "") return;

    chatbox.innerHTML +=
    `<div class="message user">
        You: ${text}
    </div>`;

    let reply = "";

    if(text.includes("headphone")){
        reply =
        "Wireless Headphones are available for ₹1,999.";
    }

    else if(text.includes("watch")){
        reply =
        "Smart Watch is available for ₹2,999.";
    }

    else if(text.includes("phone")){
        reply =
        "Smart Phone is available for ₹14,999.";
    }

    else if(text.includes("recommend")){
        reply =
        "I recommend the Smart Watch for daily use.";
    }

    else if(text.includes("cart")){
        reply =
        "You currently have " + cart + " item(s) in your cart.";
    }

    else{
        reply =
        "Please ask about products, prices, recommendations, or your cart.";
    }

    chatbox.innerHTML +=
    `<div class="message bot">
        Bot: ${reply}
    </div>`;

    chatbox.scrollTop =
    chatbox.scrollHeight;

    input.value = "";
}

</script>

</body>
</html>
